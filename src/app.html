<!doctype html>
<html lang="en" data-theme="3fp" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png?v=2" />
		<link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png?v=2" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png?v=2" />
		<link rel="icon" type="image/vnd.microsoft.icon" href="%sveltekit.assets%/favicon.ico?v=2" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png?v=2" />
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest?v=2" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(() => {
				const storageKey = '3fp-theme';
				const allowedThemes = new Set([
					'3fp',
					'mint',
					'cerberus',
					'catppuccin',
					'legacy',
					'nouveau',
					'rose',
					'sahara',
					'seafoam',
					'wintry'
				]);

				try {
					const storedTheme = window.localStorage.getItem(storageKey);
					const theme = allowedThemes.has(storedTheme) ? storedTheme : '3fp';
					document.documentElement.dataset.theme = theme;
				} catch {
					document.documentElement.dataset.theme = '3fp';
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-transparent">
		<div style="display: contents" class="overflow-hidden">%sveltekit.body%</div>
	</body>
</html>
